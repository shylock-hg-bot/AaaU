name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        include:
          - os: ubuntu-latest
            artifact_name: aaau-linux
          - os: macos-latest
            artifact_name: aaau-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.4.1'

      - name: Install dependencies
        run: opam install . --deps-only

      - name: Build binaries
        run: opam exec -- dune build --release bin/server.exe bin/client.exe

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          archive_files=(aaau-server aaau)
          cp _build/default/bin/server.exe release/aaau-server
          cp _build/default/bin/client.exe release/aaau
          # Include systemd service and install script for Linux
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            cp contrib/aaau-server.service release/
            cp contrib/install.sh release/
            chmod +x release/install.sh
            archive_files+=(aaau-server.service install.sh)
          fi
          (
            cd release
            tar -czvf ${{ matrix.artifact_name }}.tar.gz "${archive_files[@]}"
          )

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/${{ matrix.artifact_name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/*/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
